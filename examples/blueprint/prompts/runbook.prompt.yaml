apiVersion: promptfarm/v1
kind: Prompt
metadata:
  id: runbook
  version: 1.0.0
  title: Operational Runbook
spec:
  artifact:
    type: instruction
  inputs:
    - name: service_name
      type: string
      required: true
  messages:
    - role: user
      content: Produce incident response steps for {{service_name}}.
  use:
    - prompt: base

